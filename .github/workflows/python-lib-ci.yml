name: Python Library CI

on:
  workflow_call:
    inputs:
      uv-sync-args:
        description: "Extra args for uv sync (e.g. --all-extras)"
        required: false
        default: ""
        type: string
      pytest-markers:
        description: "Pytest marker expression"
        required: false
        default: ""
        type: string

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff format --check .

  lint:
    name: lint
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: webfactory/ssh-agent@v0.9.0
        if: github.actor != 'dependabot[bot]'
        with:
          ssh-private-key: |
            ${{ secrets.LEGATO_COMMON_SSH_KEY }}
            ${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}
            ${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}
      - run: uv sync --locked ${{ inputs.uv-sync-args }}
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
      - name: Run type checker
        run: uv run mypy . --ignore-missing-imports
        continue-on-error: true

  security:
    name: security
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  review:
    name: review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: echo "AI review step — configure Claude Code review action here"

  test:
    name: test
    needs: [format, lint, typecheck]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: webfactory/ssh-agent@v0.9.0
        if: github.actor != 'dependabot[bot]'
        with:
          ssh-private-key: |
            ${{ secrets.LEGATO_COMMON_SSH_KEY }}
            ${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}
            ${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}
      - run: uv sync --locked ${{ inputs.uv-sync-args }}
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
      - name: Run tests
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
        run: |
          set +e
          MARKERS="${{ inputs.pytest-markers }}"
          if [ -n "$MARKERS" ]; then
            uv run pytest -m "$MARKERS" --maxfail=1 --disable-warnings
          else
            uv run pytest --maxfail=1 --disable-warnings
          fi
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi
          exit $status
