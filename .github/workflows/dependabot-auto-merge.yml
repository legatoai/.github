name: Dependabot Auto-Merge

on:
  workflow_call:

jobs:
  auto-merge:
    name: auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Read maintainer
        id: maintainer
        run: |
          if [ -f .github/DEPENDABOT_MAINTAINER ]; then
            # Strip leading @, whitespace, and empty lines
            maintainer=$(sed 's/^@//' .github/DEPENDABOT_MAINTAINER | tr -d '[:space:]')
            echo "value=${maintainer}" >> "$GITHUB_OUTPUT"
          else
            echo "value=legatoai/platform" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          alert-lookup: true
          compat-lookup: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign maintainer
        run: |
          maintainer="${{ steps.maintainer.outputs.value }}"
          if [[ "$maintainer" == */* ]]; then
            # Team slug (org/team) — request review from team
            team_slug="${maintainer#*/}"
            gh pr edit "$PR_URL" --add-reviewer "$maintainer"
          else
            # Individual user — assign
            gh pr edit "$PR_URL" --add-assignee "$maintainer" --add-reviewer "$maintainer"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure labels exist
        run: |
          for label in security-critical security-low major-update; do
            gh label create "$label" --force 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label by severity
        run: |
          update_type="${{ steps.metadata.outputs.update-type }}"
          cvss="${{ steps.metadata.outputs.cvss }}"

          # Label based on update type
          if [[ "$update_type" == "version-update:semver-major" ]]; then
            gh pr edit "$PR_URL" --add-label "major-update"
          fi

          # Label security PRs by CVSS severity
          if [[ -n "$cvss" && "$cvss" != "0" ]]; then
            cvss_int=${cvss%%.*}
            if (( cvss_int >= 7 )); then
              gh pr edit "$PR_URL" --add-label "security-critical"
            else
              gh pr edit "$PR_URL" --add-label "security-low"
            fi
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge critical/high security + minor/patch version updates
        run: |
          update_type="${{ steps.metadata.outputs.update-type }}"
          cvss="${{ steps.metadata.outputs.cvss }}"

          should_merge=false

          # Auto-merge critical/high security updates (CVSS >= 7.0)
          if [[ -n "$cvss" && "$cvss" != "0" ]]; then
            cvss_int=${cvss%%.*}
            if (( cvss_int >= 7 )); then
              should_merge=true
              echo "Auto-merging: critical/high security update (CVSS $cvss)"
            fi
          fi

          # Auto-merge minor/patch version updates
          if [[ "$update_type" == "version-update:semver-minor" || "$update_type" == "version-update:semver-patch" ]]; then
            should_merge=true
            echo "Auto-merging: ${update_type} version update"
          fi

          if [[ "$should_merge" == "true" ]]; then
            gh pr review "$PR_URL" --approve --body "Auto-approved by dependabot-auto-merge workflow"
            gh pr merge "$PR_URL" --auto --squash
          else
            echo "Skipping auto-merge — requires manual review (major update or low-severity security)"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
