name: Dependabot Auto-Merge

on:
  workflow_call:

jobs:
  auto-merge:
    name: auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Read maintainer
        id: maintainer
        run: |
          if [ -f .github/DEPENDABOT_MAINTAINER ]; then
            maintainer=$(sed 's/^@//' .github/DEPENDABOT_MAINTAINER | tr -d '[:space:]')
            echo "value=${maintainer}" >> "$GITHUB_OUTPUT"
          else
            echo "value=legatoai/platform" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lookup max alert severity for dependencies in this PR
        id: severity
        run: |
          dep_names="${{ steps.metadata.outputs.dependency-names }}"
          max_cvss=0

          for dep in $(echo "$dep_names" | tr ',' '\n' | xargs); do
            cvss=$(gh api "repos/${{ github.repository }}/dependabot/alerts" \
              --jq "[.[] | select(.state==\"open\" and .security_vulnerability.package.name==\"$dep\")] | max_by(.security_advisory.cvss.score) | .security_advisory.cvss.score // 0" 2>/dev/null || echo "0")
            echo "  $dep: CVSS $cvss"
            if (( $(echo "$cvss > $max_cvss" | bc -l 2>/dev/null || echo 0) )); then
              max_cvss=$cvss
            fi
          done

          echo "max_cvss=$max_cvss" >> "$GITHUB_OUTPUT"
          echo "Max CVSS across all deps: $max_cvss"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign maintainer
        run: |
          maintainer="${{ steps.maintainer.outputs.value }}"
          if [[ "$maintainer" == */* ]]; then
            gh pr edit "$PR_URL" --add-reviewer "$maintainer"
          else
            gh pr edit "$PR_URL" --add-assignee "$maintainer" --add-reviewer "$maintainer"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure labels exist
        run: |
          for label in security-critical security-low major-update; do
            gh label create "$label" --force 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label by severity
        run: |
          update_type="${{ steps.metadata.outputs.update-type }}"
          max_cvss="${{ steps.severity.outputs.max_cvss }}"

          if [[ "$update_type" == "version-update:semver-major" ]]; then
            gh pr edit "$PR_URL" --add-label "major-update"
          fi

          if [[ -n "$max_cvss" && "$max_cvss" != "0" ]]; then
            cvss_int=${max_cvss%%.*}
            if (( cvss_int >= 7 )); then
              gh pr edit "$PR_URL" --add-label "security-critical"
            else
              gh pr edit "$PR_URL" --add-label "security-low"
            fi
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge critical/high security + minor/patch version updates
        run: |
          update_type="${{ steps.metadata.outputs.update-type }}"
          max_cvss="${{ steps.severity.outputs.max_cvss }}"

          should_merge=false

          # Auto-merge critical/high security updates (CVSS >= 7.0)
          if [[ -n "$max_cvss" && "$max_cvss" != "0" ]]; then
            cvss_int=${max_cvss%%.*}
            if (( cvss_int >= 7 )); then
              should_merge=true
              echo "Auto-merging: critical/high security update (max CVSS $max_cvss)"
            else
              echo "Low/medium severity (max CVSS $max_cvss) — skipping auto-merge"
            fi
          fi

          # Auto-merge minor/patch version updates (non-security)
          if [[ "$update_type" == "version-update:semver-minor" || "$update_type" == "version-update:semver-patch" ]]; then
            should_merge=true
            echo "Auto-merging: ${update_type} version update"
          fi

          if [[ "$should_merge" == "true" ]]; then
            gh pr review "$PR_URL" --approve --body "Auto-approved by dependabot-auto-merge workflow"
            gh pr merge "$PR_URL" --auto --squash
          else
            echo "Skipping auto-merge — requires manual review (major update or low-severity security)"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
