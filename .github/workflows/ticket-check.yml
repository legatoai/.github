name: Ticket Check

on:
  workflow_call:

jobs:
  ticket-check:
    name: ticket-check
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Check for Notion ticket link in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Match Notion URLs: notion.so/... or notion.site/...
          PATTERN="https://(www\.)?notion\.(so|site)/[^ )]+"

          if [[ -z "$PR_BODY" ]]; then
            echo "::error::PR description is empty. Please add a description with a Notion ticket link."
            exit 1
          fi

          if ! echo "$PR_BODY" | grep -qE "$PATTERN"; then
            echo "::error::No Notion ticket link found in PR description."
            echo ""
            echo "SOC2 compliance requires every PR to be linked to a Notion ticket."
            echo "Please add a Notion page URL to your PR description."
            echo ""
            echo "Example: https://www.notion.so/legatoai/My-Task-abc123"
            exit 1
          fi

          TICKET_URL=$(echo "$PR_BODY" | grep -oE "$PATTERN" | head -1)
          echo "Found Notion ticket: $TICKET_URL"
