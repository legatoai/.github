name: TanStack CI

on:
  workflow_call:
    inputs:
      build-matrix:
        description: "JSON array of build targets [{vendor, tenant, uuid}]. Skips build if empty."
        required: false
        default: "[]"
        type: string
      prisma:
        description: "Run prisma generate + vendor:generate before lint/build"
        required: false
        default: false
        type: boolean
      storybook:
        description: "Run storybook build job"
        required: false
        default: true
        type: boolean

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - name: Check spelling
        run: pnpm lint:spelling:all
      - name: Check type safety
        run: pnpm typecheck
      - name: Check linting
        run: pnpm lint --max-warnings 0 .
      - name: Check stylelint
        run: pnpm lint:style --max-warnings 0 .

  build:
    name: build
    if: inputs.build-matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SITE_URL: https://${{ matrix.uuid }}.app.legato.ai
        run: pnpm build
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.vendor }}-${{ matrix.tenant }}
          path: |
            .output/
            src/generated/prisma/
            package.json
            pnpm-lock.yaml
            prisma/
            prisma.config.ts
            Dockerfile
          include-hidden-files: true
          retention-days: 1

  storybook:
    name: storybook
    if: inputs.storybook
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - run: pnpm storybook:build

  security:
    name: security
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  review:
    name: review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: echo "AI review step — configure Claude Code review action here"
