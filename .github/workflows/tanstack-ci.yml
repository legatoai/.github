name: TanStack CI

on:
  workflow_call:
    inputs:
      build-matrix:
        description: "JSON array of build targets [{vendor, tenant, uuid}]. Skips build if empty."
        required: false
        default: "[]"
        type: string
      prisma:
        description: "Run prisma generate + vendor:generate before lint/build"
        required: false
        default: false
        type: boolean
      storybook:
        description: "Run storybook build job"
        required: false
        default: true
        type: boolean
      trivy-skip-dirs:
        description: "Comma-separated directories to exclude from Trivy scan (e.g. vendor,src/legacy)"
        required: false
        default: ""
        type: string

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - name: Check spelling
        run: pnpm lint:spelling:all
      - name: Check type safety
        run: pnpm typecheck
      - name: Check linting
        run: pnpm lint --max-warnings 0 .
      - name: Check stylelint
        run: pnpm lint:style --max-warnings 0 .

  build-simple:
    name: build
    if: inputs.build-matrix == '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - name: Build
        run: pnpm build

  build-matrix:
    name: build
    if: inputs.build-matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build-matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SITE_URL: https://${{ matrix.uuid }}.app.legato.ai
        run: pnpm build
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.vendor }}-${{ matrix.tenant }}
          path: |
            .output/
            src/generated/prisma/
            package.json
            pnpm-lock.yaml
            prisma/
            prisma.config.ts
            Dockerfile
          include-hidden-files: true
          retention-days: 1

  build-complete:
    name: build-complete
    if: always()
    needs: [build-simple, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.build-simple.result }}" == "failure" || "${{ needs.build-matrix.result }}" == "failure" ]]; then
            echo "Build failed"
            exit 1
          fi

  storybook:
    name: storybook
    if: inputs.storybook
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: inputs.prisma
        run: pnpm exec prisma generate
      - name: Generate vendor Prisma client
        if: inputs.prisma
        run: pnpm vendor:generate
      - run: pnpm storybook:build

  security:
    name: security
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: ${{ inputs.trivy-skip-dirs }}
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}

  review:
    name: review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: echo "AI review step — configure Claude Code review action here"
