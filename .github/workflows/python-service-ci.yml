name: Python Service CI

on:
  workflow_call:
    secrets:
      LEGATO_COMMON_SSH_KEY:
        required: false
      AGENTIC_CORE_DEPLOY_KEY:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  lint:
    name: ci/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check . || echo "ruff not configured, skipping"

  test:
    name: ci/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up SSH keys
        if: ${{ secrets.LEGATO_COMMON_SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.LEGATO_COMMON_SSH_KEY }}
            ${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}
      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: uv sync
      - name: Run tests
        run: |
          set +e
          uv run pytest -m "not integration" --maxfail=1 --disable-warnings
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi
          exit $status

  typecheck:
    name: ci/typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run mypy . --ignore-missing-imports || echo "mypy not configured, skipping"

  security:
    name: ci/security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  review:
    name: ci/review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "AI review step — configure Claude Code review action here"
