name: Python Service CI

on:
  workflow_call:
    inputs:
      uv-sync-args:
        description: "Extra args for uv sync (e.g. --all-extras)"
        required: false
        default: ""
        type: string
      pytest-markers:
        description: "Pytest marker expression"
        required: false
        default: "not integration"
        type: string
      trivy-skip-dirs:
        description: "Comma-separated directories to exclude from Trivy scan (e.g. vendor,src/legacy)"
        required: false
        default: ""
        type: string

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff format --check .

  lint:
    name: lint
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: webfactory/ssh-agent@v0.10.0
        if: github.actor != 'dependabot[bot]'
        with:
          ssh-private-key: |
            ${{ secrets.LEGATO_COMMON_SSH_KEY }}
            ${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}
            ${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}
      - run: uv sync --locked ${{ inputs.uv-sync-args }}
        continue-on-error: true
      - name: Run type checker
        run: uv run mypy . --ignore-missing-imports
        continue-on-error: true

  security:
    name: security
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: ${{ inputs.trivy-skip-dirs }}
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}

  review:
    name: review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: echo "AI review step — configure Claude Code review action here"

  test:
    name: test
    needs: [format, lint, typecheck]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: webfactory/ssh-agent@v0.10.0
        if: github.actor != 'dependabot[bot]'
        with:
          ssh-private-key: |
            ${{ secrets.LEGATO_COMMON_SSH_KEY }}
            ${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}
            ${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}
      - uses: aws-actions/configure-aws-credentials@v4
        if: github.actor != 'dependabot[bot]'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: uv sync --locked ${{ inputs.uv-sync-args }}
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
      - name: Run tests
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
        run: |
          set +e
          uv run pytest -m "${{ inputs.pytest-markers }}" --maxfail=1 --disable-warnings
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi
          exit $status
