name: Deploy — Build, Push & Update Tag

on:
  workflow_call:
    inputs:
      chart-name:
        description: "Helm chart name in helm-charts repo"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository path (e.g. legatoai/code-agency)"
        required: true
        type: string
      dockerfile-target:
        description: "Docker build target stage"
        required: false
        default: "production"
        type: string
      platform:
        description: "Docker build platform"
        required: false
        default: "linux/arm64"
        type: string
      extra-images:
        description: "JSON array of extra images to build [{target, ecr_repository}]"
        required: false
        default: "[]"
        type: string

env:
  ECR_REGISTRY: 977522846639.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: cd/build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Write SSH keys
        run: |
          mkdir -p /tmp/secrets
          if [ -n "${{ secrets.LEGATO_COMMON_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.LEGATO_COMMON_SSH_KEY }}" > /tmp/secrets/legato_common_key
            chmod 600 /tmp/secrets/legato_common_key
          fi
          if [ -n "${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}" ]; then
            printf '%s\n' "${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}" > /tmp/secrets/agentic_core_key
            chmod 600 /tmp/secrets/agentic_core_key
          fi

      - name: Build and push primary image
        run: |
          SECRETS_ARGS=""
          [ -f /tmp/secrets/legato_common_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=legato_common_key,src=/tmp/secrets/legato_common_key"
          [ -f /tmp/secrets/agentic_core_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=agentic_core_key,src=/tmp/secrets/agentic_core_key"

          docker buildx build \
            --target ${{ inputs.dockerfile-target }} \
            --build-arg GITHUB_SHA=${{ github.sha }} \
            -t $ECR_REGISTRY/${{ inputs.ecr-repository }}:${{ github.sha }} \
            -t $ECR_REGISTRY/${{ inputs.ecr-repository }}:latest \
            $SECRETS_ARGS \
            --push \
            --platform ${{ inputs.platform }} \
            .

      - name: Build and push extra images
        if: inputs.extra-images != '[]'
        run: |
          SECRETS_ARGS=""
          [ -f /tmp/secrets/legato_common_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=legato_common_key,src=/tmp/secrets/legato_common_key"
          [ -f /tmp/secrets/agentic_core_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=agentic_core_key,src=/tmp/secrets/agentic_core_key"

          echo '${{ inputs.extra-images }}' | jq -c '.[]' | while read -r item; do
            TARGET=$(echo "$item" | jq -r '.target')
            REPO=$(echo "$item" | jq -r '.ecr_repository')
            docker buildx build \
              --target "$TARGET" \
              --build-arg GITHUB_SHA=${{ github.sha }} \
              -t "$ECR_REGISTRY/$REPO:${{ github.sha }}" \
              -t "$ECR_REGISTRY/$REPO:latest" \
              $SECRETS_ARGS \
              --push \
              --platform ${{ inputs.platform }} \
              .
          done

      - name: Cleanup secrets
        if: always()
        run: rm -rf /tmp/secrets

  update-helm-tag:
    name: cd/update-tag
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Generate deploy bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_BOT_APP_ID }}
          private-key: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
          owner: legatoai
          repositories: helm-charts

      - name: Update image tag via Contents API
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = 'legatoai';
            const repo = 'helm-charts';
            const chartName = '${{ inputs.chart-name }}';
            const newTag = '${{ github.sha }}';
            const path = `charts/${chartName}/values.yaml`;

            // Get current file
            const { data: file } = await github.rest.repos.getContent({
              owner, repo, path, ref: 'main',
            });

            // Decode content
            const content = Buffer.from(file.content, 'base64').toString('utf8');

            // Update image tag (within the image: block)
            const updated = content.replace(
              /(image:\s*\n(?:\s+\w+:.*\n)*?\s+tag:\s*)(?:&\w+\s+)?["']?[^"'\n]+["']?/,
              `$1"${newTag}"`
            );

            if (content === updated) {
              console.log(`No tag change needed in ${path}`);
              return;
            }

            // Commit via Contents API (atomic, no race condition)
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update ${chartName} image tag to ${newTag}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
              branch: 'main',
              committer: {
                name: 'legato-deploy-bot',
                email: 'legato-deploy-bot[bot]@users.noreply.github.com',
              },
            });

            console.log(`Updated ${path} with tag ${newTag}`);
