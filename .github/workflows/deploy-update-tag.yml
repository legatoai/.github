name: Deploy — Build, Push & Update Tag

on:
  workflow_call:
    inputs:
      chart-name:
        description: "Helm chart name in helm-charts repo"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository path (e.g. legatoai/code-agency)"
        required: true
        type: string
      dockerfile-target:
        description: "Docker build target stage (empty = no target)"
        required: false
        default: ""
        type: string
      platform:
        description: "Docker build platform"
        required: false
        default: "linux/arm64"
        type: string
      runner:
        description: "GitHub Actions runner label"
        required: false
        default: "ubuntu-24.04-arm"
        type: string
      extra-images:
        description: "JSON array of extra images to build [{target, ecr_repository}]"
        required: false
        default: "[]"
        type: string

env:
  ECR_REGISTRY: 977522846639.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: build-push
    runs-on: ${{ inputs.runner }}
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Write SSH keys
        run: |
          mkdir -p /tmp/secrets
          if [ -n "${{ secrets.LEGATO_COMMON_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.LEGATO_COMMON_SSH_KEY }}" > /tmp/secrets/legato_common_key
            chmod 600 /tmp/secrets/legato_common_key
          fi
          if [ -n "${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}" ]; then
            printf '%s\n' "${{ secrets.AGENTIC_CORE_DEPLOY_KEY }}" > /tmp/secrets/agentic_core_key
            chmod 600 /tmp/secrets/agentic_core_key
          fi
          if [ -n "${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}" ]; then
            printf '%s\n' "${{ secrets.AGENT_FRAMEWORK_DEPLOY_KEY }}" > /tmp/secrets/agent_framework_key
            chmod 600 /tmp/secrets/agent_framework_key
          fi

      - name: Build secret-files list
        id: secrets
        run: |
          FILES=""
          [ -f /tmp/secrets/legato_common_key ] && FILES="${FILES}legato_common_key=/tmp/secrets/legato_common_key\n"
          [ -f /tmp/secrets/agentic_core_key ] && FILES="${FILES}agentic_core_key=/tmp/secrets/agentic_core_key\n"
          [ -f /tmp/secrets/agent_framework_key ] && FILES="${FILES}agent_framework_key=/tmp/secrets/agent_framework_key\n"
          echo "secret_files<<EOF" >> $GITHUB_OUTPUT
          printf "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push primary image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: ${{ inputs.dockerfile-target || '' }}
          platforms: ${{ inputs.platform }}
          build-args: GITHUB_SHA=${{ github.sha }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr-repository }}:latest
          secret-files: ${{ steps.secrets.outputs.secret_files }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push extra images
        if: inputs.extra-images != '[]'
        run: |
          echo '${{ inputs.extra-images }}' | jq -c '.[]' | while read -r item; do
            TARGET=$(echo "$item" | jq -r '.target')
            REPO=$(echo "$item" | jq -r '.ecr_repository')
            echo "Building $TARGET → $REPO"

            SECRETS_ARGS=""
            [ -f /tmp/secrets/legato_common_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=legato_common_key,src=/tmp/secrets/legato_common_key"
            [ -f /tmp/secrets/agentic_core_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=agentic_core_key,src=/tmp/secrets/agentic_core_key"
            [ -f /tmp/secrets/agent_framework_key ] && SECRETS_ARGS="$SECRETS_ARGS --secret id=agent_framework_key,src=/tmp/secrets/agent_framework_key"

            docker buildx build \
              --target "$TARGET" \
              --build-arg GITHUB_SHA=${{ github.sha }} \
              -t "${{ env.ECR_REGISTRY }}/$REPO:${{ github.sha }}" \
              -t "${{ env.ECR_REGISTRY }}/$REPO:latest" \
              $SECRETS_ARGS \
              --push \
              --platform ${{ inputs.platform }} \
              .
          done

      - name: Cleanup secrets
        if: always()
        run: rm -rf /tmp/secrets

  update-helm-tag:
    name: update-tag
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Generate deploy bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_BOT_APP_ID }}
          private-key: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
          owner: legatoai
          repositories: helm-charts

      - name: Clone helm-charts and update image tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/legatoai/helm-charts.git
          cd helm-charts
          git config user.name "legato-deploy-bot[bot]"
          git config user.email "legato-deploy-bot[bot]@users.noreply.github.com"

          CHART_DIR="charts/${{ inputs.chart-name }}"
          if [ -d "$CHART_DIR" ]; then
            sed -i -E '/^image:/,/^[a-zA-Z]/ s/(^[[:space:]]+tag:[[:space:]]*)(&[a-zA-Z0-9_-]+[[:space:]]+)?(.*)$/\1\2"${{ github.sha }}"/' "$CHART_DIR/values.yaml"
            git add "$CHART_DIR/values.yaml"
            git commit -m "Update ${{ inputs.chart-name }} image tag to ${{ github.sha }}" || true
            git push origin main
          fi
