name: Release Please

on:
  workflow_call:
    inputs:
      release-type:
        description: "Release type (python, node, etc.)"
        required: false
        default: "python"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: cd/release
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: ${{ inputs.release-type }}
