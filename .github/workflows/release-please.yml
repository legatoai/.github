name: Release Please

on:
  workflow_call:
    inputs:
      release-type:
        description: "Release type (python, node, etc.)"
        required: false
        default: "python"
        type: string

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: ${{ inputs.release-type }}
